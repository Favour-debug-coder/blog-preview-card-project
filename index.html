<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->

  <style>
    body {
      background-color: #f4d04e;
      
    }
    .card {
      width: 300px;
      height: 450px;
      background-color: white;
      border-right: 7px solid;
      border-bottom: 7px solid;
      border-left:thick black;
      margin: 50px auto;
      border-radius: 15px;
      padding: 15px;
      box-shadow: 0 8px 20px;
      rgba(0,0,0,0.15);
    }

    .card-image {
      width: 100%;
      border-radius: 12px;
    }

    .tag {
      background-color: #f4d04e;
      display: inline-block;
      padding: 5px 10px;
      border-radius: 5px;
      font-weight: bold;
    }

    .date {
      font-size: 15px;
      font-weight:lighter;
    
    }

    .title {
      font-size: 20px;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
    }

    .title:hover {
      color: #f4d04e;
      transition: 0.3s;
      cursor: pointer;
    }

    

    .description {
      color: gray;
       
      
    }

    .avatar {
      width: 35px;
      border-radius: 50%;
      vertical-align: middle;
    }

    .author {
      margin: 7px;
      font-weight:700;   
    }

  </style>
</head>
<body>
  <div class="card">
    <img src="images/illustration-article.svg" alt="Yellow illustration with attract shapes"
    class="card-image">

    <p class="tag">Learning</p>
    <p class="date">Published 21 Dec 2023</p>

    <h2 class="title">HTML CSS foundations</h2>
    <p class="description">These languages are the backbone of every website, defining structure, content, and 
    presentation.</p>
    <img src="images/image-avatar.jpg" alt="profile photo of a person" class="avatar">
    <span class="author">Greg Hooper</span>
  </div>    
 

  
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Favour</a>.
  </div>
</body>
</html>
